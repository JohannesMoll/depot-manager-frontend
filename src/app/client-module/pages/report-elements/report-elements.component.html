<nb-card [nbSpinner]="loading">
    <nb-card-header class="header-flex">
        <div class="filter">
            <label class="label" [for]="filterInput"><nb-icon icon="funnel"/></label>
            <input
                nbInput
                [nbFilterInput]="dataSource"
                [debounceTime]="250"
                fieldSize="small"
                [(ngModel)]="filter"
                [status]="filter ? 'success' : 'basic'"
                #filterInput
            />
        </div>
        <nb-actions size="small" class="float-right">
            <nb-action icon="refresh" (click)="reportService.reload()"></nb-action>
            <nb-action>
                <button nbButton size="small" status="primary" (click)="onCreate()">
                    Neuen Report erstellen
                </button>
            </nb-action>
        </nb-actions>
    </nb-card-header>
    <nb-card-body>
        <table [nbTreeGrid]="dataSource" [nbSort]="dataSource" (sort)="updateSort($event)">
            <tr nbTreeGridHeaderRow *nbTreeGridHeaderRowDef="allColumns"></tr>
            <tr
                nbTreeGridRow
                *nbTreeGridRowDef="let row; columns: allColumns"
                (dblclick)="onClickReportElement($event, row.data)"
                [clickToToggle]="false"
            ></tr>

            <ng-container nbTreeGridColumnDef="title">
                <th
                    nbTreeGridHeaderCell
                    [nbSortHeader]="getSortDirection('title')"
                    *nbTreeGridHeaderCellDef
                    class="sortable"
                >
                    Title
                </th>
                <td nbTreeGridCell *nbTreeGridCellDef="let row">
                    <span class="clickable-name" (click)="onClickReportElement($event, row.data)">
                        {{ row.data.title }}
                    </span>
                </td>
            </ng-container>

            <ng-container nbTreeGridColumnDef="description">
                <th
                    nbTreeGridHeaderCell
                    [nbSortHeader]="getSortDirection('description')"
                    *nbTreeGridHeaderCellDef
                    class="sortable"
                >
                    Description
                </th>
                <td nbTreeGridCell *nbTreeGridCellDef="let row">
                    {{ row.data.description }}
                </td>
            </ng-container>

            <ng-container nbTreeGridColumnDef="action">
                <th nbTreeGridHeaderCell *nbTreeGridHeaderCellDef>Action</th>
                <td nbTreeGridCell *nbTreeGridCellDef="let row">
                    <button
                        nbButton
                        ghost
                        status="info"
                        (click)="onClickReportElement($event, row.data)"
                        nbTooltip="View Report Element"
                    >
                        <nb-icon [icon]="isReportExpanded(row.data.id) ? 'chevron-up' : 'chevron-down'"></nb-icon>
                    </button>
                    <button
                        nbButton
                        ghost
                        (click)="onEditReport($event, row.data.id)"
                        nbTooltip="Edit"
                    >
                        <nb-icon icon="edit"></nb-icon>
                    </button>
                </td>
            </ng-container>
        </table>

        <!-- Expanded Report Element Details -->
        <ng-container *ngFor="let row of reportData">
            <div *ngIf="isReportExpanded(row.data.id)" class="expanded-report-details">
                <nb-card accent="info">
                    <nb-card-header>
                        <h5>{{ row.data.title }}</h5>
                        <button
                            nbButton
                            ghost
                            size="small"
                            class="close-button"
                            (click)="toggleReportExpansion(row.data.id)"
                        >
                            <nb-icon icon="close-outline"></nb-icon>
                        </button>
                    </nb-card-header>
                    <nb-card-body>
                        <p *ngIf="row.data.description"><strong>Description:</strong></p>
                        <markdown *ngIf="row.data.description" [data]="row.data.description"></markdown>
                    </nb-card-body>
                </nb-card>
            </div>
        </ng-container>
    </nb-card-body>
</nb-card>
