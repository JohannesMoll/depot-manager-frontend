<nb-list>
    <nb-list-item *ngFor="let state of displayStates">
        <div class="report-container">
            <div class="report-data">
                <div>
                    <span class="key">{{ state.comment }}: </span>
                    <span class="value">{{ state.timestamp | formatDateTime }}</span>
                </div>
                <div class="report-count">{{ state.report.length }} element(s)</div>
            </div>
            <div class="report-link">
                <button size="small" nbButton ghost (click)="showReport(state.id)">Show Report</button>
            </div>
        </div>
    </nb-list-item>
</nb-list>

<div *ngIf="!displayStates || displayStates.length === 0" class="no-reports">
    <p>No reports available.</p>
</div>
